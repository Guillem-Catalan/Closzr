name: Backfill

on:
  workflow_dispatch:
    inputs:
      team:
        description: 'Team name (e.g., DS Rubén, XL, TIM). Leave empty if using email.'
        required: false
        type: string
      email:
        description: 'Individual email (e.g., camila.vento@factorial.co). Leave empty if using team.'
        required: false
        type: string
      limit:
        description: 'Max deals to process (default: 500)'
        required: false
        default: '500'
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          AZURE_CLAUDE_ENDPOINT: ${{ secrets.AZURE_CLAUDE_ENDPOINT }}
          AZURE_CLAUDE_API_KEY: ${{ secrets.AZURE_CLAUDE_API_KEY }}
          MODJO_API_KEY: ${{ secrets.MODJO_API_KEY }}
        run: |
          python -c "
          from src.pipelines.backfill.run2 import run
          team = '${{ inputs.team }}' or None
          email = '${{ inputs.email }}' or None
          run(team=team, email=email, limit=int('${{ inputs.limit }}'))
          "
