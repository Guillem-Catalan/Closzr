name: Hourly — Meetings + Briefings + Email Drafts

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly
  cancel-in-progress: false

jobs:
  hourly:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt

      - name: Run Hourly
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          AZURE_CLAUDE_ENDPOINT: ${{ secrets.AZURE_CLAUDE_ENDPOINT }}
          AZURE_CLAUDE_API_KEY: ${{ secrets.AZURE_CLAUDE_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "
          from src.pipelines.hourly.run import run
          run()
          "
