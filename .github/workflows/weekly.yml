name: Weekly — Patterns

on:
  workflow_dispatch:

concurrency:
  group: weekly
  cancel-in-progress: true

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt

      - name: Run Weekly
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AZURE_CLAUDE_ENDPOINT: ${{ secrets.AZURE_CLAUDE_ENDPOINT }}
          AZURE_CLAUDE_API_KEY: ${{ secrets.AZURE_CLAUDE_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "
          from src.pipelines.weekly.run import run
          run()
          "
